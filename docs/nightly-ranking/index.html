<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>StockTracker 全市場排名</title>
<style>
body{background:#121212;color:#e6e6e6;font-family:'Segoe UI',sans-serif;margin:0;padding:20px;}
.panel{background:#1e1e1e;border:1px solid #303030;border-radius:8px;padding:12px;margin-bottom:12px;}
.row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:8px;}
label{font-size:12px;color:#c8c8c8;}
input,select{background:#222;color:#fff;border:1px solid #444;border-radius:4px;padding:6px 8px;min-width:78px;}
input[type=checkbox]{min-width:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th,td{border:1px solid #2f2f2f;padding:6px 8px;text-align:left;}
th{background:#2b2b2b;cursor:pointer;position:sticky;top:0;}
tr:nth-child(even){background:#1a1a1a;}
.muted{color:#9aa0a6;font-size:12px;}
.rise{color:#ff6b6b;font-weight:600;}
.fall{color:#2ecc71;font-weight:600;}
.flat{color:#d0d0d0;}
</style>
</head>
<body>
<h2>全市場掃描排名</h2><div class="muted">更新時間：2026-06-29 22:01:31</div>
<div class="panel">
<div class='row'><label>搜尋</label><input id='searchInput' placeholder='代號/名稱/策略/建議/型態' /><label>Top</label><input id='topCount' type='number' min='1' placeholder='100' /><label>價格</label><input id='minPrice' type='number' step='0.01' placeholder='Min' /><input id='maxPrice' type='number' step='0.01' placeholder='Max' /><label>漲跌幅%</label><input id='minChange' type='number' step='0.01' placeholder='Min' /><input id='maxChange' type='number' step='0.01' placeholder='Max' /></div>
<div class='row'><label>三大法人買賣超</label><input id='minNet' type='number' step='1' placeholder='Min' /><input id='maxNet' type='number' step='1' placeholder='Max' /><label>買賣超金額</label><input id='minNetAmount' type='number' step='1' placeholder='Min' /><input id='maxNetAmount' type='number' step='1' placeholder='Max' /><label>最新分數≥</label><input id='minScore' type='number' step='1' placeholder='0' /><label>風險分≥</label><input id='minCrash' type='number' step='1' placeholder='0' /><label>型態數≥</label><input id='minPatternCount' type='number' step='1' placeholder='0' /></div>
<div class='row'><label>指定型態</label><select id='patternFilter'><option value=''>全部</option></select><label>策略動作</label><select id='actionFilter'><option value=''>全部</option></select><label>建議倉位</label><select id='holdingFilter'><option value=''>全部</option></select><label>建議</label><select id='suggestionFilter'><option value=''>全部</option></select><label>近5日均分≥</label><input id='minAvg' type='number' step='0.1' placeholder='0' /><label><input id='trendUp' type='checkbox' /> 近5日分數趨勢上升</label></div>
<div class='row'><label>連續天數</label><input id='minConDays' type='number' step='1' placeholder='0' /><label>分數≥</label><input id='minConScore' type='number' step='1' placeholder='60' value='60' /></div>
</div>
<div class="panel"><table id="rankingTable"><thead><tr>
<th data-type='num'>排名</th><th data-type='text'>代號</th><th data-type='text'>名稱</th><th data-type='num'>分數</th><th data-type='num'>風險分</th><th data-type='num'>型態數</th><th data-type='text'>型態</th><th data-type='num'>D0</th><th data-type='num'>D1</th><th data-type='num'>D2</th><th data-type='num'>D3</th><th data-type='num'>D4</th><th data-type='num'>近5日均分</th><th data-type='num'>趨勢</th><th data-type='num'>三大法人買賣超</th><th data-type='num'>三大法人買賣超金額</th><th data-type='text'>策略動作</th><th data-type='text'>建議倉位</th><th data-type='text'>建議</th><th data-type='num'>最新價</th><th data-type='num'>漲跌幅</th>
</tr></thead><tbody>

</tbody></table></div>
<script>
const table=document.getElementById('rankingTable');const tbody=table.tBodies[0];const $=id=>document.getElementById(id);const f={search:$('searchInput'),top:$('topCount'),minPrice:$('minPrice'),maxPrice:$('maxPrice'),minChange:$('minChange'),maxChange:$('maxChange'),minNet:$('minNet'),maxNet:$('maxNet'),minNetAmount:$('minNetAmount'),maxNetAmount:$('maxNetAmount'),minScore:$('minScore'),minCrash:$('minCrash'),minPatternCount:$('minPatternCount'),pattern:$('patternFilter'),action:$('actionFilter'),holding:$('holdingFilter'),suggestion:$('suggestionFilter'),minAvg:$('minAvg'),trendUp:$('trendUp'),minConDays:$('minConDays'),minConScore:$('minConScore')};
function num(v){const n=parseFloat(v);return Number.isFinite(n)?n:null;}function txt(cell){return (cell.textContent||'').trim();}function lower(cell){return txt(cell).toLowerCase();}
function fillSelect(col,sel){const vals=[...new Set([...tbody.rows].map(r=>txt(r.cells[col])).filter(x=>x))].sort((a,b)=>a.localeCompare(b,'zh-Hant'));vals.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;sel.appendChild(o);});}
fillSelect(6,f.pattern);fillSelect(16,f.action);fillSelect(17,f.holding);fillSelect(18,f.suggestion);
function passRange(value,min,max){if(min!==null&&value<min)return false;if(max!==null&&value>max)return false;return true;}
function consecutiveDays(row,minScore){const d=[num(txt(row.cells[7]))||0,num(txt(row.cells[8]))||0,num(txt(row.cells[9]))||0,num(txt(row.cells[10]))||0,num(txt(row.cells[11]))||0];let s=0;for(const v of d){if(v<minScore)break;s++;}return s;}
function applyFilter(){const kw=(f.search.value||'').trim().toLowerCase();const top=num(f.top.value);const minPrice=num(f.minPrice.value),maxPrice=num(f.maxPrice.value),minChange=num(f.minChange.value),maxChange=num(f.maxChange.value),minNet=num(f.minNet.value),maxNet=num(f.maxNet.value),minNetAmount=num(f.minNetAmount.value),maxNetAmount=num(f.maxNetAmount.value),minScore=num(f.minScore.value),minCrash=num(f.minCrash.value),minPatternCount=num(f.minPatternCount.value),minAvg=num(f.minAvg.value),minConDays=Math.max(0,num(f.minConDays.value)||0),minConScore=num(f.minConScore.value)??60;const pattern=f.pattern.value,action=f.action.value,holding=f.holding.value,suggestion=f.suggestion.value,trendUp=f.trendUp.checked;[...tbody.rows].forEach(r=>{const rank=num(txt(r.cells[0]))||0;const score=num(txt(r.cells[3]))||0;const crash=num(txt(r.cells[4]))||0;const pcount=num(txt(r.cells[5]))||0;const avg=num(txt(r.cells[12]))||0;const trend=num(txt(r.cells[13]))||0;const net=num(txt(r.cells[14]))||0;const netAmount=num(txt(r.cells[15]))||0;const price=num(txt(r.cells[19]))||0;const chg=num(txt(r.cells[20]))||0;const text=r.textContent.toLowerCase();let ok=true;if(top!==null&&rank>top)ok=false;if(kw&&text.indexOf(kw)<0)ok=false;if(!passRange(price,minPrice,maxPrice))ok=false;if(!passRange(chg,minChange,maxChange))ok=false;if(!passRange(net,minNet,maxNet))ok=false;if(!passRange(netAmount,minNetAmount,maxNetAmount))ok=false;if(minScore!==null&&score<minScore)ok=false;if(minCrash!==null&&crash<minCrash)ok=false;if(minPatternCount!==null&&pcount<minPatternCount)ok=false;if(pattern&&lower(r.cells[6]).indexOf(pattern.toLowerCase())<0)ok=false;if(action&&txt(r.cells[16])!==action)ok=false;if(holding&&txt(r.cells[17])!==holding)ok=false;if(suggestion&&txt(r.cells[18])!==suggestion)ok=false;if(minAvg!==null&&avg<minAvg)ok=false;if(trendUp&&trend<=0)ok=false;if(minConDays>0&&consecutiveDays(r,minConScore)<minConDays)ok=false;r.style.display=ok?'':'none';});}
Object.values(f).forEach(el=>{if(!el)return;const evt=(el.type==='checkbox'||el.tagName==='SELECT')?'change':'input';el.addEventListener(evt,applyFilter);});
let sortState={idx:0,asc:true};[...table.tHead.rows[0].cells].forEach((th,idx)=>{th.addEventListener('click',()=>{const type=th.dataset.type||'text';sortState.asc=(sortState.idx===idx)?!sortState.asc:true;sortState.idx=idx;const rows=[...tbody.rows];rows.sort((a,b)=>{let va=txt(a.cells[idx]),vb=txt(b.cells[idx]);if(type==='num'){va=parseFloat(va)||0;vb=parseFloat(vb)||0;return sortState.asc?va-vb:vb-va;}return sortState.asc?va.localeCompare(vb,'zh-Hant'):vb.localeCompare(va,'zh-Hant');});rows.forEach(r=>tbody.appendChild(r));applyFilter();});});
</script>
</body></html>
